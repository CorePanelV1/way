<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0810"/>
      <stop offset="100%" stop-color="#0a0608"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Stars -->
  <circle cx="150" cy="70" r="1.1" fill="#f5e6d0" opacity="0.55"/>
  <circle cx="380" cy="48" r="0.8" fill="#ffe8a0" opacity="0.6"/>
  <circle cx="820" cy="60" r="1.3" fill="#f5e6d0" opacity="0.45"/>
  <circle cx="1050" cy="80" r="0.9" fill="#f5e6d0" opacity="0.5"/>
  <circle cx="250" cy="140" r="0.7" fill="#f5e6d0" opacity="0.35"/>
  <circle cx="950" cy="120" r="1.0" fill="#b4c8ff" opacity="0.4"/>
  <!-- Card mockup -->
  <rect x="400" y="70" width="400" height="490" rx="18" fill="#0d0608" stroke="rgba(201,168,76,0.18)" stroke-width="1"/>
  <!-- Card glow -->
  <ellipse cx="600" cy="220" rx="160" ry="100" fill="rgba(201,168,76,0.04)"/>
  <!-- Top rule -->
  <line x1="440" y1="132" x2="760" y2="132" stroke="rgba(201,168,76,0.25)" stroke-width="0.5"/>
  <!-- WAY wordmark -->
  <text x="430" y="122" font-family="Georgia, serif" font-size="11" letter-spacing="5" fill="rgba(201,168,76,0.75)" font-weight="bold">WAY</text>
  <!-- Glyph top-right -->
  <text x="770" y="122" font-family="serif" font-size="15" fill="rgba(201,168,76,0.7)" text-anchor="end">☽</text>
  <!-- Quote -->
  <text x="600" y="245" font-family="Georgia, serif" font-size="24" font-style="italic" fill="rgba(245,230,208,0.93)" text-anchor="middle">الصبر مفتاح الفرج</text>
  <!-- Translation -->
  <text x="600" y="292" font-family="Georgia, serif" font-size="13.5" font-style="italic" fill="rgba(245,230,208,0.45)" text-anchor="middle">Patience is the key to relief.</text>
  <!-- Bottom rule -->
  <line x1="440" y1="490" x2="760" y2="490" stroke="rgba(201,168,76,0.25)" stroke-width="0.5"/>
  <text x="430" y="506" font-family="Georgia, serif" font-size="8.5" letter-spacing="2.5" fill="rgba(201,168,76,0.55)">SABR</text>
  <text x="770" y="506" font-family="Georgia, serif" font-size="7.5" letter-spacing="1.5" fill="rgba(245,230,208,0.22)" text-anchor="end">23°N 45°E</text>
  <!-- WAY title bottom -->
  <text x="600" y="580" font-family="Georgia, serif" font-size="13" letter-spacing="5" fill="rgba(245,230,208,0.28)" text-anchor="middle" font-weight="bold">WAY — FIND YOUR BEARING</text>
  <!-- Bottom gold rule -->
  <line x1="0" y1="629" x2="1200" y2="629" stroke="rgba(201,168,76,0.25)" stroke-width="1"/>
</svg>
