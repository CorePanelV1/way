/* ── STAR CANVAS ── */
(function(){
  const c=document.getElementById('bg'),cx=c.getContext('2d');
  let W,H,stars=[];
  const dunes=[[0,.72],[.07,.68],[.18,.74],[.28,.63],[.40,.70],[.50,.61],[.62,.69],[.72,.59],[.84,.67],[.93,.63],[1,.66]];
  function init(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=[];
    const n=Math.floor(W*H/4200);
    for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H*.76,r:.1+Math.random()*1.4,ph:Math.random()*Math.PI*2,sp:.006+Math.random()*.02,br:.25+Math.random()*.75,col:Math.random()<.12?[255,210,140]:Math.random()<.1?[180,200,255]:[237,229,200]});
  }
  function draw(){
    cx.clearRect(0,0,W,H);
    const sg=cx.createLinearGradient(0,0,0,H);
    sg.addColorStop(0,'#05030a');sg.addColorStop(.6,'#090507');sg.addColorStop(1,'#0d0905');
    cx.fillStyle=sg;cx.fillRect(0,0,W,H);
    stars.forEach(s=>{
      s.ph+=s.sp;const a=s.br*(.45+.55*Math.sin(s.ph));if(a<.04)return;
      cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
      cx.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${a})`;cx.fill();
    });
    const hY=H*.68;
    const dg=cx.createLinearGradient(0,hY,0,H);
    dg.addColorStop(0,'rgba(10,6,4,1)');dg.addColorStop(1,'rgba(4,2,1,1)');
    cx.beginPath();
    const dp=dunes.map(([fx,fy])=>[fx*W,hY+(fy-.62)*(H-hY)*.5+H*.04]);
    cx.moveTo(dp[0][0],dp[0][1]);
    for(let i=1;i<dp.length-1;i++){const mx=(dp[i][0]+dp[i+1][0])/2,my=(dp[i][1]+dp[i+1][1])/2;cx.quadraticCurveTo(dp[i][0],dp[i][1],mx,my);}
    cx.lineTo(W,H);cx.lineTo(0,H);cx.fillStyle=dg;cx.fill();
    requestAnimationFrame(draw);
  }
  init();window.addEventListener('resize',init);draw();
})();

/* ── CULTURE ACCENT COLORS ── */
const ACCENTS = {
  arabic:'140,27,53',
  zen:'26,107,88',
  stoic:'122,72,32',
  ubuntu:'122,48,16',
};

/* ── DAY OF YEAR ── */
function dayOfYear(d){
  const start = new Date(d.getFullYear(),0,0);
  return Math.floor((d - start) / 86400000);
}

/* ── RENDER ── */
let _dayKey = 'arabic';
(function(){
  const now = new Date();
  const idx = dayOfYear(now) % CARDS.length;
  const card = CARDS[idx];

  // Set accent CSS var
  const root = document.documentElement;
  root.style.setProperty('--accent', `rgb(${ACCENTS[card.key] || '201,168,76'})`);
  root.style.setProperty('--accent-rgb', ACCENTS[card.key] || '201,168,76');

  // Date display
  const dateStr = now.toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('day-date').textContent = dateStr;

  // Card content
  document.getElementById('dc-glyph').textContent = card.glyph;
  document.getElementById('dc-glyph').style.color = `rgb(${ACCENTS[card.key]||'201,168,76'})`;
  document.getElementById('dc-culture').textContent = card.culture;
  document.getElementById('dc-coord').textContent = card.coord;
  document.getElementById('dc-quote').textContent = card.quote;
  document.getElementById('dc-translation').textContent = card.translation;
  document.getElementById('dc-concept').textContent = card.concept;
  document.getElementById('dc-practice').textContent = card.practice;
  document.getElementById('dc-context').textContent = card.context;

  // Meta tags
  const short = card.translation.length > 80 ? card.translation.slice(0,77)+'…' : card.translation;
  document.getElementById('pg-title').textContent = `WAY of the Day — ${dateStr}`;
  document.getElementById('og-title').content = `WAY of the Day — ${card.culture} Wisdom`;
  document.getElementById('og-desc').content = `"${short}" · ${card.concept}`;
  document.getElementById('pg-desc').content = `"${short}" · ${card.concept}`;

  // Set audio key for today's tradition
  _dayKey = card.key;

  // X share link
  const xText = `"${card.translation}"\n— ${card.concept}, ${card.culture} Wisdom · WAY of the Day`;
  document.getElementById('x-btn').href =
    'https://x.com/intent/tweet?text=' + encodeURIComponent(xText) + '&url=' + encodeURIComponent(location.href);
})();

/* ── AUDIO ENGINE ── */
const DayAudio = (() => {
  let actx=null,master=null,alive=[],playing=false;
  function ctx(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0;master.connect(actx.destination);}return actx;}
  function rev(s){const ac=ctx(),len=ac.sampleRate*s,buf=ac.createBuffer(2,len,ac.sampleRate);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.8);}const c=ac.createConvolver();c.buffer=buf;return c;}
  function osc(f,type,g,dest,det){const ac=ctx(),o=ac.createOscillator(),gn=ac.createGain();o.type=type;o.frequency.value=f;if(det)o.detune.value=(Math.random()-.5)*det;gn.gain.value=g;o.connect(gn);gn.connect(dest);o.start();alive.push(o);return{o,gn};}
  function lfo(n,rate,depth){const ac=ctx(),l=ac.createOscillator(),lg=ac.createGain();l.frequency.value=rate;lg.gain.value=depth;l.connect(lg);lg.connect(n.gn.gain);l.start();alive.push(l);}
  const S={
    arabic(){const rv=rev(5);rv.connect(master);const f=ctx().createBiquadFilter();f.type='lowpass';f.frequency.value=1100;f.connect(rv);[220,247,330,415].forEach((freq,i)=>{const n=osc(freq,'sine',.048,f,10);lfo(n,3+i*.4,.009);});},
    zen(){const rv=rev(10);rv.connect(master);osc(432,'sine',.13,rv,3);osc(864,'sine',.04,rv,2);function bell(){if(!playing)return;const ac=ctx(),o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=880+Math.random()*50;g.gain.setValueAtTime(.18,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4.5);o.connect(g);g.connect(rv);o.start();o.stop(ac.currentTime+4.6);setTimeout(bell,7000+Math.random()*6000);}setTimeout(bell,2000);},
    stoic(){const rv=rev(7);rv.connect(master);const f=ctx().createBiquadFilter();f.type='lowpass';f.frequency.value=460;f.connect(rv);[55,110,165].forEach(freq=>{const ac=ctx(),o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.value=freq;g.gain.value=.055;o.connect(g);g.connect(f);o.start();alive.push(o);});},
    ubuntu(){const rv=rev(4);rv.connect(master);[264,330,396,495].forEach((freq,i)=>{const n=osc(freq,'sine',.055,rv,7);lfo(n,4.5+i*.3,.007);});}
  };
  return{
    play(key){this.stop();const fn=S[key]||S.arabic;const ac=ctx();if(ac.state==='suspended')ac.resume();fn();playing=true;master.gain.cancelScheduledValues(ac.currentTime);master.gain.setTargetAtTime(1,ac.currentTime,1.4);},
    stop(){if(!actx)return;master.gain.setTargetAtTime(0,actx.currentTime,.5);const k=[...alive];setTimeout(()=>k.forEach(n=>{try{n.stop();}catch(e){}}),1800);alive=[];playing=false;},
    toggle(key){if(playing){this.stop();return false;}this.play(key);return true;},
    get playing(){return playing;}
  };
})();

function toggleDayAudio(){
  const btn  = document.getElementById('play-day-btn');
  const icon = document.getElementById('play-day-icon');
  const lbl  = document.getElementById('play-day-label');
  const on   = DayAudio.toggle(_dayKey);
  btn.classList.toggle('playing', on);
  icon.innerHTML = on
    ? '<rect x="0" y="0" width="3.5" height="12"/><rect x="6.5" y="0" width="3.5" height="12"/>'
    : '<polygon points="0,0 10,6 0,12"/>';
  lbl.textContent = on ? 'Pause' : 'Play Ambient';
}

/* ── COPY LINK ── */
function copyLink(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const btn = document.querySelector('.sh-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(()=>btn.textContent=orig,2000);
  });
}

/* ── NAV SCROLL TINT ── */
window.addEventListener('scroll',()=>{
  document.getElementById('top-nav').classList.toggle('scrolled',window.scrollY>40);
},{passive:true});
</script>
