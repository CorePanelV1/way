<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#8c1b35" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0608" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0608"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.2" fill="#f5e6d0" opacity="0.6"/>
  <circle cx="340" cy="55" r="0.8" fill="#f5e6d0" opacity="0.5"/>
  <circle cx="580" cy="40" r="1.5" fill="#ffe8a0" opacity="0.7"/>
  <circle cx="780" cy="70" r="0.9" fill="#f5e6d0" opacity="0.4"/>
  <circle cx="980" cy="50" r="1.3" fill="#f5e6d0" opacity="0.6"/>
  <circle cx="1090" cy="90" r="0.7" fill="#b4c8ff" opacity="0.5"/>
  <circle cx="210" cy="150" r="0.8" fill="#f5e6d0" opacity="0.3"/>
  <circle cx="450" cy="120" r="1.0" fill="#f5e6d0" opacity="0.5"/>
  <circle cx="700" cy="100" r="0.7" fill="#ffe8a0" opacity="0.4"/>
  <circle cx="900" cy="130" r="1.1" fill="#f5e6d0" opacity="0.45"/>
  <circle cx="60" cy="200" r="0.9" fill="#f5e6d0" opacity="0.35"/>
  <circle cx="1150" cy="170" r="0.8" fill="#f5e6d0" opacity="0.4"/>
  <circle cx="300" cy="220" r="1.2" fill="#f5e6d0" opacity="0.3"/>
  <circle cx="860" cy="190" r="0.7" fill="#b4c8ff" opacity="0.35"/>

  <!-- Top gold rule -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>

  <!-- Dune silhouette -->
  <path d="M0,500 Q60,472 140,488 Q220,504 310,470 Q400,436 490,458 Q580,480 660,448 Q740,416 830,440 Q920,464 1000,432 Q1080,400 1140,420 L1200,428 L1200,630 L0,630 Z" fill="#0a0608"/>
  <path d="M0,540 Q80,520 180,534 Q280,548 380,518 Q480,488 570,510 Q660,532 760,505 Q860,478 950,498 Q1040,518 1130,500 L1200,508 L1200,630 L0,630 Z" fill="#070406"/>

  <!-- Compass rose (center) -->
  <g transform="translate(600,290)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="72" stroke="rgba(201,168,76,0.12)" stroke-width="0.8" fill="none"/>
    <circle cx="0" cy="0" r="58" stroke="rgba(245,230,208,0.06)" stroke-width="0.5" fill="none"/>
    <!-- North needle (gold) -->
    <polygon points="0,-52 -5,-18 0,-24 5,-18" fill="#c9a84c" opacity="0.9"/>
    <!-- South needle -->
    <polygon points="0,52 -5,18 0,24 5,18" fill="rgba(245,230,208,0.22)"/>
    <!-- East needle -->
    <polygon points="52,0 18,-5 24,0 18,5" fill="rgba(245,230,208,0.18)"/>
    <!-- West needle -->
    <polygon points="-52,0 -18,-5 -24,0 -18,5" fill="rgba(245,230,208,0.18)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#c9a84c" opacity="0.8"/>
    <circle cx="0" cy="0" r="10" stroke="rgba(201,168,76,0.2)" stroke-width="0.5" fill="none"/>
    <!-- Cardinal ticks -->
    <line x1="0" y1="-58" x2="0" y2="-64" stroke="rgba(201,168,76,0.4)" stroke-width="1.2"/>
    <line x1="58" y1="0" x2="64" y2="0" stroke="rgba(245,230,208,0.2)" stroke-width="0.8"/>
    <line x1="-58" y1="0" x2="-64" y2="0" stroke="rgba(245,230,208,0.2)" stroke-width="0.8"/>
    <line x1="0" y1="58" x2="0" y2="64" stroke="rgba(245,230,208,0.2)" stroke-width="0.8"/>
    <!-- Gold radial glow -->
    <circle cx="0" cy="0" r="72" fill="url(#gold-glow)"/>
  </g>

  <!-- WAY wordmark -->
  <text x="600" y="162" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" letter-spacing="28" fill="#f5e6d0" opacity="0.95">WAY</text>

  <!-- Tagline -->
  <text x="600" y="204" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="6" fill="rgba(201,168,76,0.7)">FIND YOUR BEARING</text>

  <!-- Divider lines flanking WAY -->
  <line x1="200" y1="148" x2="440" y2="148" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
  <line x1="760" y1="148" x2="1000" y2="148" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
  <text x="480" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="rgba(201,168,76,0.35)">✦</text>
  <text x="720" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="rgba(201,168,76,0.35)">✦</text>

  <!-- Four traditions row -->
  <text x="600" y="550" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="5" fill="rgba(245,230,208,0.25)">ARABIC  ·  ZEN  ·  STOIC  ·  UBUNTU</text>

  <!-- Bottom gold rule -->
  <line x1="0" y1="629" x2="1200" y2="629" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
</svg>
